<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="80" fill="url(#bg)"/>

  <!-- Drop shape left (giving) -->
  <path d="M130,100 C130,100 90,155 90,185 C90,207 108,225 130,225 C152,225 170,207 170,185 C170,155 130,100 130,100 Z"
    fill="white" opacity="1"/>

  <!-- Drop shape right (receiving) — flipped/offset -->
  <path d="M270,175 C270,175 230,230 230,260 C230,282 248,300 270,300 C292,300 310,282 310,260 C310,230 270,175 270,175 Z"
    fill="white" opacity="0.7"/>

  <!-- Small connecting dot -->
  <circle cx="200" cy="212" r="10" fill="white" opacity="0.5"/>

  <!-- Wordmark -->
  <text x="200" y="355" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="800" fill="white" text-anchor="middle" letter-spacing="2">DropSwap</text>
</svg>
